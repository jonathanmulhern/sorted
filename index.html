```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sorted</title>
<link rel="stylesheet" href="styles.css">
</head>

<body>

<div class="container">

<h1>SORTED</h1>
<p class="tagline">Brain dump. Focus. Done.</p>

<div class="card">

<h2 id="greeting">Good morning, Captain.</h2>

<textarea id="brainDump"
placeholder="What's on your mind?

mark books
ring jo
speak to doctor
clean floor"></textarea>

<button id="sortButton">Sort It</button>

</div>

<div class="grid">

<div class="column">
<h3>⭐ Today (<span id="todayCount">0</span>)</h3>
<div id="today"></div>
</div>

<div class="column">
<h3>📚 School (<span id="schoolCount">0</span>)</h3>
<div id="school"></div>
</div>

<div class="column">
<h3>🏠 Home (<span id="homeCount">0</span>)</h3>
<div id="home"></div>
</div>

<div class="column">
<h3>💪 Health (<span id="healthCount">0</span>)</h3>
<div id="health"></div>
</div>

<div class="column">
<h3>💷 Money (<span id="moneyCount">0</span>)</h3>
<div id="money"></div>
</div>

<div class="column">
<h3>🤔 Needs Review (<span id="reviewCount">0</span>)</h3>
<div id="review"></div>
</div>

<div class="column">
<h3>✅ Done (<span id="doneCount">0</span>)</h3>
<div id="done"></div>
</div>

</div>

</div>

<script src="app.js"></script>

</body>
</html>
