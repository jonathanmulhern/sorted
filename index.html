```html
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sorted</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="container">

    <h1>SORTED</h1>
    <p class="tagline">Brain dump. Focus. Done.</p>

    <div class="card">
        <h2>Good morning, Captain.</h2>

        <textarea id="brainDump"
            placeholder="What's on your mind?

mark books
ring jo
speak to doctor
clean floor"></textarea>

        <button id="sortButton">Sort It</button>
    </div>

    <div class="grid">

        <div class="column">
            <h3>📚 School</h3>
            <div id="school"></div>
        </div>

        <div class="column">
            <h3>🏠 Home</h3>
            <div id="home"></div>
        </div>

        <div class="column">
            <h3>💪 Health</h3>
            <div id="health"></div>
        </div>

        <div class="column">
            <h3>💷 Money</h3>
            <div id="money"></div>
        </div>

        <div class="column">
            <h3>🧠 Ideas</h3>
            <div id="ideas"></div>
        </div>

        <div class="column">
            <h3>⭐ Top 3</h3>
            <div id="top3"></div>
        </div>

        <div class="column">
            <h3>⏸ Not Today</h3>
            <div id="notToday"></div>
        </div>

        <div class="column">
            <h3>✅ Done</h3>
            <div id="done"></div>
        </div>

    </div>

</div>

<script src="app.js"></script>

</body>
</html>
